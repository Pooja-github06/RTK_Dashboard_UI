version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "@me"
    assignees:
      - "@me"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    # Auto-merge patch and minor updates
    auto-merge:
      enabled: true
      operations:
        allow-one-auto-merge: true
